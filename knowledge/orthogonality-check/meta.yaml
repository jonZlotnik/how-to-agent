title: Orthogonality Check
summary: >-
  Orthogonal components change independently. The test is simple: change one thing; count what else must move. If unrelated areas have to follow, the design is coupled, and every future change pays that tax.
when_to_use: >-
  Use when designing a module, reviewing a PR that touches many files, or considering whether to merge or split a component. Also use when a 'small' change unexpectedly cascades through unrelated areas.
related:
  - dry-audit
  - reversible-decisions
  - design-by-contract
  - broken-windows
