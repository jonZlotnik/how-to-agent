title: Prove, Don't Assume
summary: >-
  Most debugging dead-ends are paved with unverified assumptions. "It should be non-null here." "This function returns sorted output." "The cache is invalidated." *Should* is not evidence. Replace every load-bearing belief with a cheap check.
when_to_use: >-
  Use when stuck in debugging, before merging a risky change, or whenever you find yourself thinking 'it should work' or 'X is probably true'. Also use when an LLM, teammate, or doc asserts something load-bearing that hasn't been verified in this codebase.
related:
  - fix-the-problem-not-the-blame
  - design-by-contract
  - listen-to-nagging-doubts
